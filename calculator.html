<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.calculator{
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

h1{
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

input{
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}

.buttons{
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
}

button{
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #1e3c72;
}

#result{
    margin-top: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #222;
}
</style>



</head>

<body>

    <div class="calculator">
        <h1>Calculator</h1>

        <input type="number" id="num1" placeholder="Enter First Number">

        <input type="number" id="num2" placeholder="Enter Second Number">

        <div class="buttons"><br><br>
            <button onclick="add()">Add (+)</button><br><br>
            <button onclick="subtract()">Subtract (-)</button><br><br>
            <button onclick="multiply()">Multiply (×)</button><br><br>
            <button onclick="divide()">Divide (÷)</button><br><br>
            <button onclick="square()">Square (x²)</button><br><br>
        
        </div>

        <div id="result">
            Result: 0
        </div>
    </div>

    <script>


        function getValues() {
            let num1 = Number(document.getElementById("num1").value);
            let num2 = Number(document.getElementById("num2").value);

            return { num1, num2 };
        }

        function displayResult(value) {
            document.getElementById("result").innerText =
                "Result: " + value;
        }

        function add() {
            let { num1, num2 } = getValues();
            displayResult(num1 + num2);
        }

        function subtract() {
            let { num1, num2 } = getValues();
            displayResult(num1 - num2);
        }

        function multiply() {
            let { num1, num2 } = getValues();
            displayResult(num1 * num2);
        }

        function divide() {
            let { num1, num2 } = getValues();

            if (num2 === 0) {
                displayResult("Cannot divide by zero");
                return;
            }

            displayResult(num1 / num2);
        }

        function square() {
            let num1 = Number(document.getElementById("num1").value);

            displayResult(num1 * num1);
        }
    </script>

</body>

</html>
